version: '3.8'

services:
  stonkfish:
    build: .
    container_name: stonkfish-bot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      # Persist portfolio data in a directory (more reliable than single file mounts)
      - ./data:/app/data
      # Optional: Mount logs if you add logging
      # - ./logs:/app/logs
    environment:
      - TZ=America/New_York
      - STONKFISH_DATA_DIR=/app/data
    # Health check (optional)
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f bot.py || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
