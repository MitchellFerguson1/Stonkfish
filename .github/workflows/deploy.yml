name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    needs: []
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/Stonkfish
            git pull origin main
            # Ensure data directory exists for persistent storage
            mkdir -p data
            # Migrate old portfolio data if it exists at root level
            if [ -f portfolio_data.json ] && [ ! -f data/portfolio_data.json ]; then
              cp portfolio_data.json data/portfolio_data.json
              echo "Migrated portfolio_data.json to data directory"
            fi
            docker-compose down
            docker-compose up -d --build
            docker-compose logs --tail=20
