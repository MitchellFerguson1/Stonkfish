# Ruff configuration for Stonkfish

line-length = 120
target-version = "py311"

[lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # Pyflakes
    "I",    # isort
    "B",    # flake8-bugbear
    "UP",   # pyupgrade
]
ignore = [
    "E501",   # line too long (handled by formatter)
    "B008",   # do not perform function calls in argument defaults
]

[lint.per-file-ignores]
"bot.py" = ["E402"]  # module level import not at top of file (if needed)

[format]
quote-style = "double"
indent-style = "space"
